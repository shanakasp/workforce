services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run build && node dist/index.js"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/workforce
    network_mode: host
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workforce
    network_mode: host
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
