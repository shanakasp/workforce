services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run build && node dist/index.js"
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@host.docker.internal:5432/workforce}
    restart: unless-stopped

volumes: {}
